services:
  db:
    image: postgres:16-alpine
    container_name: pm_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pm_backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/product_management?sslmode=disable
      JWT_SECRET: super-secret-dev-key
      JWT_EXPIRY_HOURS: 24
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: pm_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
